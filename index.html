<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Africa Time Zones</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --sand: #f5ede0;
      --ochre: #c9762a;
      --rust: #8b3a1e;
      --forest: #2a4a2e;
      --gold: #d4a017;
      --dark: #1a1208;
      --cream: #fdf8f0;
    }

    body {
      background-color: var(--dark);
      color: var(--sand);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* Decorative background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 50% at 20% 10%, rgba(201,118,42,0.12) 0%, transparent 60%),
        radial-gradient(ellipse 60% 40% at 80% 90%, rgba(42,74,46,0.18) 0%, transparent 55%);
      pointer-events: none;
      z-index: 0;
    }

    header {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 56px 24px 32px;
      border-bottom: 1px solid rgba(201,118,42,0.25);
    }

    .header-label {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.3em;
      color: var(--gold);
      text-transform: uppercase;
      margin-bottom: 12px;
    }

    header h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2.4rem, 6vw, 4.2rem);
      font-weight: 900;
      line-height: 1.05;
      color: var(--sand);
      letter-spacing: -0.01em;
    }

    header h1 span {
      color: var(--ochre);
    }

    .header-sub {
      margin-top: 14px;
      font-size: 14px;
      color: rgba(245,237,224,0.55);
      font-weight: 300;
      letter-spacing: 0.04em;
    }

    /* Live clock strip */
    .utc-bar {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 14px 24px;
      background: rgba(201,118,42,0.08);
      border-bottom: 1px solid rgba(201,118,42,0.15);
      font-family: 'DM Mono', monospace;
      font-size: 13px;
      color: rgba(245,237,224,0.5);
      letter-spacing: 0.08em;
    }

    .utc-bar span {
      color: var(--gold);
      font-weight: 500;
    }

    /* Search */
    .search-wrap {
      position: relative;
      z-index: 1;
      max-width: 440px;
      margin: 36px auto 0;
      padding: 0 24px;
    }

    .search-wrap input {
      width: 100%;
      background: rgba(245,237,224,0.06);
      border: 1px solid rgba(201,118,42,0.3);
      border-radius: 8px;
      padding: 13px 18px;
      color: var(--sand);
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      outline: none;
      transition: border-color 0.2s;
    }

    .search-wrap input::placeholder { color: rgba(245,237,224,0.3); }
    .search-wrap input:focus { border-color: var(--ochre); }

    /* Grid */
    .grid {
      position: relative;
      z-index: 1;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 18px;
      max-width: 1280px;
      margin: 36px auto 60px;
      padding: 0 24px;
    }

    .card {
      background: rgba(245,237,224,0.04);
      border: 1px solid rgba(201,118,42,0.18);
      border-radius: 12px;
      padding: 24px 22px 20px;
      transition: transform 0.22s, border-color 0.22s, background 0.22s;
      cursor: default;
      animation: fadeIn 0.5s ease both;
    }

    .card:hover {
      transform: translateY(-3px);
      border-color: rgba(201,118,42,0.55);
      background: rgba(245,237,224,0.07);
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .card-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 18px;
    }

    .flag {
      font-size: 2rem;
      line-height: 1;
    }

    .tz-badge {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.12em;
      color: var(--gold);
      background: rgba(212,160,23,0.1);
      border: 1px solid rgba(212,160,23,0.25);
      border-radius: 4px;
      padding: 3px 8px;
      white-space: nowrap;
    }

    .country-name {
      font-family: 'Playfair Display', serif;
      font-size: 1.25rem;
      font-weight: 700;
      color: var(--sand);
      margin-bottom: 4px;
    }

    .capital {
      font-size: 12px;
      color: rgba(245,237,224,0.4);
      font-weight: 300;
      letter-spacing: 0.04em;
    }

    .time-display {
      margin-top: 16px;
      padding-top: 16px;
      border-top: 1px solid rgba(201,118,42,0.12);
    }

    .time-hms {
      font-family: 'DM Mono', monospace;
      font-size: 1.9rem;
      font-weight: 500;
      color: var(--cream);
      letter-spacing: 0.04em;
      line-height: 1;
    }

    .time-date {
      font-size: 12px;
      color: rgba(245,237,224,0.4);
      margin-top: 6px;
      letter-spacing: 0.03em;
    }

    .no-results {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 60px 24px;
      color: rgba(245,237,224,0.35);
      font-size: 15px;
      display: none;
    }

    footer {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 24px;
      border-top: 1px solid rgba(201,118,42,0.12);
      font-size: 12px;
      color: rgba(245,237,224,0.25);
      letter-spacing: 0.06em;
    }
  </style>
</head>
<body>

<header>
  <div class="header-label">Real-Time Clock</div>
  <h1>African <span>Time Zones</span></h1>
  <p class="header-sub">Live local times across the African continent</p>
</header>

<div class="utc-bar">
  UTC &nbsp;|&nbsp; <span id="utc-clock">--:--:-- UTC</span>
</div>

<div class="search-wrap">
  <input type="text" id="search" placeholder="Search country or capital…" />
</div>

<div class="grid" id="grid"></div>
<div class="no-results" id="no-results">No countries found.</div>

<footer>Africa Time Zones &mdash; Updates every second</footer>

<script>
  const countries = [
    { name: "Nigeria",           capital: "Abuja",          flag: "🇳🇬", tz: "Africa/Lagos",       offset: "UTC+1"  },
    { name: "South Africa",      capital: "Pretoria",       flag: "🇿🇦", tz: "Africa/Johannesburg", offset: "UTC+2" },
    { name: "Kenya",             capital: "Nairobi",        flag: "🇰🇪", tz: "Africa/Nairobi",      offset: "UTC+3"  },
    { name: "Ghana",             capital: "Accra",          flag: "🇬🇭", tz: "Africa/Accra",        offset: "UTC+0"  },
    { name: "Egypt",             capital: "Cairo",          flag: "🇪🇬", tz: "Africa/Cairo",        offset: "UTC+2"  },
    { name: "Ethiopia",          capital: "Addis Ababa",    flag: "🇪🇹", tz: "Africa/Addis_Ababa",  offset: "UTC+3"  },
    { name: "Tanzania",          capital: "Dodoma",         flag: "🇹🇿", tz: "Africa/Dar_es_Salaam",offset: "UTC+3"  },
    { name: "Uganda",            capital: "Kampala",        flag: "🇺🇬", tz: "Africa/Kampala",      offset: "UTC+3"  },
    { name: "Senegal",           capital: "Dakar",          flag: "🇸🇳", tz: "Africa/Dakar",        offset: "UTC+0"  },
    { name: "Cameroon",          capital: "Yaoundé",        flag: "🇨🇲", tz: "Africa/Douala",       offset: "UTC+1"  },
    { name: "Morocco",           capital: "Rabat",          flag: "🇲🇦", tz: "Africa/Casablanca",   offset: "UTC+1"  },
    { name: "Algeria",           capital: "Algiers",        flag: "🇩🇿", tz: "Africa/Algiers",      offset: "UTC+1"  },
    { name: "Tunisia",           capital: "Tunis",          flag: "🇹🇳", tz: "Africa/Tunis",        offset: "UTC+1"  },
    { name: "Libya",             capital: "Tripoli",        flag: "🇱🇾", tz: "Africa/Tripoli",      offset: "UTC+2"  },
    { name: "Sudan",             capital: "Khartoum",       flag: "🇸🇩", tz: "Africa/Khartoum",     offset: "UTC+3"  },
    { name: "Zimbabwe",          capital: "Harare",         flag: "🇿🇼", tz: "Africa/Harare",       offset: "UTC+2"  },
    { name: "Angola",            capital: "Luanda",         flag: "🇦🇴", tz: "Africa/Luanda",       offset: "UTC+1"  },
    { name: "Mozambique",        capital: "Maputo",         flag: "🇲🇿", tz: "Africa/Maputo",       offset: "UTC+2"  },
    { name: "Madagascar",        capital: "Antananarivo",   flag: "🇲🇬", tz: "Indian/Antananarivo", offset: "UTC+3"  },
    { name: "Zambia",            capital: "Lusaka",         flag: "🇿🇲", tz: "Africa/Lusaka",       offset: "UTC+2"  },
    { name: "Rwanda",            capital: "Kigali",         flag: "🇷🇼", tz: "Africa/Kigali",       offset: "UTC+2"  },
    { name: "Ivory Coast",       capital: "Yamoussoukro",   flag: "🇨🇮", tz: "Africa/Abidjan",      offset: "UTC+0"  },
    { name: "Democratic Rep. of Congo", capital: "Kinshasa", flag: "🇨🇩", tz: "Africa/Kinshasa",   offset: "UTC+1"  },
    { name: "Somalia",           capital: "Mogadishu",      flag: "🇸🇴", tz: "Africa/Mogadishu",    offset: "UTC+3"  },
  ];

  // Build cards
  const grid = document.getElementById('grid');
  const noResults = document.getElementById('no-results');

  countries.forEach((c, i) => {
    const card = document.createElement('div');
    card.className = 'card';
    card.dataset.name = c.name.toLowerCase();
    card.dataset.capital = c.capital.toLowerCase();
    card.style.animationDelay = `${i * 35}ms`;
    card.innerHTML = `
      <div class="card-top">
        <span class="flag">${c.flag}</span>
        <span class="tz-badge">${c.offset}</span>
      </div>
      <div class="country-name">${c.name}</div>
      <div class="capital">${c.capital}</div>
      <div class="time-display">
        <div class="time-hms" id="hms-${i}">--:--:--</div>
        <div class="time-date" id="date-${i}">---</div>
      </div>
    `;
    grid.appendChild(card);
  });

  // Format helpers
  function getTime(tz) {
    return new Date().toLocaleTimeString('en-GB', { timeZone: tz, hour12: false });
  }
  function getDate(tz) {
    return new Date().toLocaleDateString('en-GB', { timeZone: tz, weekday: 'short', day: 'numeric', month: 'short', year: 'numeric' });
  }

  // Tick
  function tick() {
    // UTC bar
    document.getElementById('utc-clock').textContent =
      new Date().toUTCString().split(' ').slice(4).join(' ').replace('GMT', 'UTC');

    countries.forEach((c, i) => {
      document.getElementById(`hms-${i}`).textContent = getTime(c.tz);
      document.getElementById(`date-${i}`).textContent  = getDate(c.tz);
    });
  }

  tick();
  setInterval(tick, 1000);

  // Search
  document.getElementById('search').addEventListener('input', function () {
    const q = this.value.toLowerCase();
    const cards = grid.querySelectorAll('.card');
    let visible = 0;
    cards.forEach(card => {
      const match = card.dataset.name.includes(q) || card.dataset.capital.includes(q);
      card.style.display = match ? '' : 'none';
      if (match) visible++;
    });
    noResults.style.display = visible === 0 ? 'block' : 'none';
  });
</script>
</body>
</html>
